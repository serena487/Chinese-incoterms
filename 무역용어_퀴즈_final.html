<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="무역용어 빈칸 채우기 연습문제 — 청약·승낙, 인코텀즈 2020, 무역서류, 결제 용어">
<title>무역용어 연습문제</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:     #0d0f18;
  --s1:     #13151f;
  --s2:     #191c2a;
  --s3:     #1f2335;
  --border: #252840;
  --accent: #e2b45a;
  --blue:   #5c8ee0;
  --green:  #4db87a;
  --red:    #e05c5c;
  --purple: #9b72e0;
  --teal:   #4dc4b8;
  --text:   #e4e0d8;
  --muted:  #6c7090;
  --radius: 6px;
}

html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Serif KR', serif;
  min-height: 100vh;
  line-height: 1.6;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: radial-gradient(circle, rgba(92,142,224,.05) 1px, transparent 1px);
  background-size: 28px 28px;
  pointer-events: none;
  z-index: 0;
}

.app { display: flex; min-height: 100vh; position: relative; z-index: 1; }

/* ── Sidebar ── */
.sidebar {
  width: 264px; flex-shrink: 0;
  background: var(--s1);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  position: fixed; top: 0; left: 0; bottom: 0;
  overflow-y: auto; z-index: 40;
  transition: transform .25s ease;
}
.sidebar::-webkit-scrollbar { width: 3px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); }

.sb-brand { padding: 22px 18px 16px; border-bottom: 1px solid var(--border); }
.sb-brand h1 { font-size: 14px; font-weight: 700; color: var(--accent); line-height: 1.45; }
.sb-brand .zh { font-family: 'Noto Sans SC', sans-serif; font-size: 10px; color: var(--muted); margin-top: 4px; }

.sb-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; padding: 12px 14px; border-bottom: 1px solid var(--border); }
.stat-box { background: var(--s2); border: 1px solid var(--border); border-radius: 4px; padding: 8px 10px; text-align: center; }
.stat-box .num { font-family: 'IBM Plex Mono', monospace; font-size: 18px; font-weight: 600; line-height: 1; margin-bottom: 3px; }
.stat-box .lbl { font-size: 9px; color: var(--muted); letter-spacing: .5px; }
.stat-box.sc .num { color: var(--green); }
.stat-box.sw .num { color: var(--red); }
.stat-box.st .num { color: var(--accent); }
.stat-box.sp .num { color: var(--blue); }

.sb-section { padding: 11px 18px 5px; font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }

.cat-item {
  display: flex; align-items: center; gap: 9px;
  padding: 8px 18px; cursor: pointer;
  border-left: 2px solid transparent;
  transition: all .15s; font-size: 12px; color: var(--muted);
}
.cat-item:hover { background: var(--s2); color: var(--text); }
.cat-item.active { border-left-color: var(--accent); background: var(--s2); color: var(--accent); }
.ci-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.ci-count { margin-left: auto; font-family: 'IBM Plex Mono', monospace; font-size: 9px; background: var(--s3); padding: 1px 6px; border-radius: 8px; color: var(--muted); }

.sb-tools { padding: 10px 12px; border-top: 1px solid var(--border); margin-top: auto; display: flex; flex-direction: column; gap: 6px; }
.sb-btn {
  padding: 7px 12px; border: 1px solid var(--border); border-radius: 4px;
  background: transparent; color: var(--muted);
  font-family: 'Noto Serif KR', serif; font-size: 11px;
  cursor: pointer; transition: all .15s; text-align: left;
  display: flex; align-items: center; gap: 7px;
}
.sb-btn:hover { background: var(--s2); color: var(--text); border-color: var(--blue); }
.sb-btn.pri { background: var(--accent); border-color: var(--accent); color: #0d0f18; font-weight: 700; }
.sb-btn.pri:hover { background: #c9a04e; }
.sb-btn.danger:hover { border-color: var(--red); color: var(--red); }

/* ── Main ── */
.main { margin-left: 264px; flex: 1; display: flex; flex-direction: column; }

/* ── Topbar ── */
.topbar {
  position: sticky; top: 0; z-index: 30;
  background: rgba(13,15,24,.93);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 26px; display: flex; align-items: center; gap: 14px; height: 50px; flex-shrink: 0;
}
.topbar-left { display: flex; align-items: baseline; gap: 8px; }
#topTitle { font-size: 13px; font-weight: 600; color: var(--text); }
#topZh { font-family: 'Noto Sans SC', sans-serif; font-size: 10px; color: var(--muted); }
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 9px; }

.mode-toggle { display: flex; background: var(--s2); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
.mode-btn { padding: 4px 11px; font-size: 11px; font-family: 'Noto Serif KR', serif; color: var(--muted); cursor: pointer; border: none; background: transparent; transition: all .15s; }
.mode-btn.on { background: var(--accent); color: #0d0f18; font-weight: 700; }
.mode-btn:hover:not(.on) { color: var(--text); }

.prog-pill { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); background: var(--s2); border: 1px solid var(--border); padding: 3px 10px; border-radius: 20px; }
.prog-pill span { color: var(--accent); }

.top-btn { padding: 4px 12px; border: 1px solid var(--border); border-radius: 4px; background: transparent; color: var(--text); font-family: 'Noto Serif KR', serif; font-size: 11px; cursor: pointer; transition: all .15s; }
.top-btn:hover { background: var(--s2); border-color: var(--blue); }

.prog-bar-wrap { height: 2px; background: var(--border); flex-shrink: 0; }
.prog-bar-fill { height: 100%; background: linear-gradient(90deg, var(--blue), var(--accent)); transition: width .5s ease; }

/* ── Content ── */
.content { padding: 24px 26px 100px; flex: 1; }

.empty-state { text-align: center; padding: 80px 20px; color: var(--muted); }
.empty-state .big { font-size: 48px; margin-bottom: 14px; }

/* ── Question Card ── */
.q-card {
  background: var(--s1); border: 1px solid var(--border);
  border-radius: var(--radius); margin-bottom: 12px; overflow: hidden;
  transition: border-color .3s, box-shadow .3s;
  animation: fadeUp .2s ease both;
}
@keyframes fadeUp { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
.q-card.st-correct { border-color: var(--green); box-shadow: 0 0 0 1px rgba(77,184,122,.1); }
.q-card.st-wrong   { border-color: var(--red);   box-shadow: 0 0 0 1px rgba(224,92,92,.1); }
.q-card.st-reveal  { border-color: var(--accent); }

.q-top {
  display: flex; align-items: center; gap: 9px;
  padding: 10px 15px 9px; background: var(--s2);
  border-bottom: 1px solid var(--border);
}
.q-num { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: #0d0f18; background: var(--accent); padding: 2px 7px; border-radius: 3px; flex-shrink: 0; }
.cat-badge { font-family: 'Noto Sans SC', sans-serif; font-size: 9px; padding: 1px 8px; border-radius: 10px; border: 1px solid; letter-spacing: .3px; }
.cb-offer  { color: var(--blue);   border-color: rgba(92,142,224,.4);  background: rgba(92,142,224,.08); }
.cb-inco   { color: var(--accent); border-color: rgba(226,180,90,.4);  background: rgba(226,180,90,.08); }
.cb-doc    { color: var(--green);  border-color: rgba(77,184,122,.4);  background: rgba(77,184,122,.08); }
.cb-pay    { color: var(--teal);   border-color: rgba(77,196,184,.4);  background: rgba(77,196,184,.08); }
.cb-zh     { color: var(--purple); border-color: rgba(155,114,224,.4); background: rgba(155,114,224,.08); }
.q-blanks  { margin-left: auto; font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: var(--muted); }
.q-icon    { font-size: 13px; }

.q-body { padding: 14px 16px 12px; }

.q-text {
  font-size: 15px; line-height: 2.1; color: var(--text);
  margin-bottom: 12px; word-break: keep-all;
}
.bwrap { display: inline-flex; align-items: center; vertical-align: bottom; }
.bidx  { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: var(--muted); margin-right: 2px; padding-bottom: 1px; }
.q-text input {
  background: var(--s3); border: none; border-bottom: 2px solid var(--blue);
  color: var(--text); font-family: 'Noto Sans SC', sans-serif; font-size: 14px;
  padding: 1px 6px 0; outline: none; border-radius: 0; min-width: 50px;
  transition: border-color .2s, background .2s;
}
.q-text input:focus { border-bottom-color: var(--accent); background: rgba(226,180,90,.05); }
.q-text input.ok  { border-bottom-color: var(--green); color: var(--green); background: rgba(77,184,122,.07); }
.q-text input.bad { border-bottom-color: var(--red);   color: var(--red);   background: rgba(224,92,92,.07); }

.btn-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.qbtn { padding: 5px 13px; border: 1px solid var(--border); border-radius: 3px; background: transparent; color: var(--text); font-family: 'Noto Serif KR', serif; font-size: 11px; cursor: pointer; transition: all .15s; }
.qbtn:hover { background: var(--s2); }
.qbtn.grade { background: var(--blue); border-color: var(--blue); color: #fff; font-weight: 700; }
.qbtn.grade:hover { background: #4a7dce; }
.qbtn.grade:disabled { opacity: .4; cursor: not-allowed; }
.qbtn.hint  { border-color: var(--accent); color: var(--accent); }
.qbtn.hint:hover  { background: rgba(226,180,90,.1); }
.qbtn.show  { border-color: var(--muted); color: var(--muted); font-size: 10px; }
.qbtn.show:hover  { border-color: var(--text); color: var(--text); }
.qbtn.retry { border-color: var(--purple); color: var(--purple); }
.qbtn.retry:hover { background: rgba(155,114,224,.1); }

.hint-area { display: none; flex-wrap: wrap; gap: 6px; margin-top: 9px; padding: 9px 11px; background: var(--s3); border-radius: 4px; border-left: 3px solid var(--accent); }
.hint-area.open { display: flex; }
.hint-chip { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--accent); background: rgba(226,180,90,.08); border: 1px solid rgba(226,180,90,.25); padding: 2px 9px; border-radius: 3px; }

.ans-box { display: none; margin-top: 9px; padding: 9px 13px; background: rgba(77,184,122,.06); border-left: 3px solid var(--green); border-radius: 0 4px 4px 0; font-size: 13px; line-height: 1.7; }
.ans-box.open { display: block; }
.ans-note { font-size: 11px; color: var(--muted); margin-top: 4px; font-style: italic; }

.wrong-msg { display: none; margin-top: 7px; font-size: 11px; color: var(--red); padding: 5px 11px; background: rgba(224,92,92,.07); border-radius: 3px; }
.wrong-msg.open { display: block; }

/* ── Score Panel ── */
.score-panel { display: none; margin-top: 28px; background: var(--s1); border: 1px solid var(--accent); border-radius: var(--radius); padding: 32px; text-align: center; }
.score-panel.open { display: block; animation: fadeUp .3s ease; }
.score-big { font-family: 'IBM Plex Mono', monospace; font-size: 60px; font-weight: 600; color: var(--accent); line-height: 1; margin-bottom: 10px; }
.score-msg { font-size: 15px; color: var(--text); margin-bottom: 5px; }
.score-sub { font-size: 12px; color: var(--muted); }
.score-acts { display: flex; gap: 10px; justify-content: center; margin-top: 18px; }
.score-acts button { padding: 8px 20px; border: 1px solid var(--border); border-radius: 4px; background: transparent; color: var(--text); font-family: 'Noto Serif KR', serif; font-size: 13px; cursor: pointer; transition: all .15s; }
.score-acts button:hover { background: var(--s2); border-color: var(--blue); }
.score-acts button.pri { background: var(--accent); border-color: var(--accent); color: #0d0f18; font-weight: 700; }
.score-acts button.pri:hover { background: #c9a04e; }

/* ── Toast ── */
.toast { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%) translateY(16px); background: var(--s2); border: 1px solid var(--border); color: var(--text); font-size: 12px; padding: 8px 18px; border-radius: 20px; opacity: 0; transition: all .25s ease; z-index: 200; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── Mobile ── */
.ham { display: none; position: fixed; top: 11px; left: 11px; z-index: 100; background: var(--s1); border: 1px solid var(--border); border-radius: 4px; padding: 7px 10px; cursor: pointer; color: var(--text); font-size: 15px; }
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 35; }

@media (max-width: 768px) {
  .ham { display: block; }
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .overlay.open { display: block; }
  .main { margin-left: 0; }
  .topbar { padding: 0 12px 0 50px; }
  .content { padding: 16px 12px 90px; }
  .q-text { font-size: 14px; }
}
</style>
</head>
<body>

<button class="ham" onclick="toggleSb()">☰</button>
<div class="overlay" id="overlay" onclick="toggleSb()"></div>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sb-brand">
      <h1>무역용어<br>빈칸 연습문제</h1>
      <div class="zh">国际贸易术语 填空练习</div>
    </div>
    <div class="sb-stats">
      <div class="stat-box sc"><div class="num" id="sC">0</div><div class="lbl">정답</div></div>
      <div class="stat-box sw"><div class="num" id="sW">0</div><div class="lbl">오답</div></div>
      <div class="stat-box st"><div class="num" id="sT">0</div><div class="lbl">전체 빈칸</div></div>
      <div class="stat-box sp"><div class="num" id="sP">0%</div><div class="lbl">정답률</div></div>
    </div>
    <div class="sb-section">카테고리</div>
    <div id="catList"></div>
    <div class="sb-section">학습 도구</div>
    <div style="padding:4px 12px 8px;display:flex;flex-direction:column;gap:5px;">
      <button class="sb-btn" onclick="gradeAll()">✓ 전체 채점</button>
      <button class="sb-btn" onclick="showAll()">📖 정답 모두 보기</button>
      <button class="sb-btn" onclick="wrongOnly()">🔁 오답만 보기</button>
      <button class="sb-btn" onclick="shuffle()">🔀 문제 섞기</button>
    </div>
    <div class="sb-tools">
      <button class="sb-btn pri" onclick="resetAll()">↺ 처음부터 다시 풀기</button>
      <button class="sb-btn danger" onclick="clearData()">🗑 저장 데이터 삭제</button>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <span id="topTitle">전체 문제</span>
        <span id="topZh"></span>
      </div>
      <div class="topbar-right">
        <div class="mode-toggle">
          <button class="mode-btn on" id="btnStudy" onclick="setMode('study')">학습</button>
          <button class="mode-btn"    id="btnExam"  onclick="setMode('exam')">시험</button>
        </div>
        <div class="prog-pill"><span id="pProg">0</span> / <span id="pTotal">0</span></div>
        <button class="top-btn" onclick="gradeAll()">전체 채점</button>
      </div>
    </div>
    <div class="prog-bar-wrap"><div class="prog-bar-fill" id="progBar" style="width:0%"></div></div>

    <div class="content">
      <div id="quizArea"></div>
      <div class="score-panel" id="scorePanel">
        <div class="score-big" id="scoreBig"></div>
        <div class="score-msg" id="scoreMsg"></div>
        <div class="score-sub" id="scoreSub"></div>
        <div class="score-acts">
          <button onclick="wrongOnly()">🔁 오답 복습</button>
          <button class="pri" onclick="resetAll()">↺ 다시 풀기</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════
//  DATA
// ════════════════════════════════════════════
const CATS = [
  { id:'all',   label:'전체',          zh:'',                      dot:'#e2b45a' },
  { id:'offer', label:'청약·승낙',     zh:'发盘与接受',              dot:'#5c8ee0' },
  { id:'inco',  label:'인코텀즈 2020', zh:'国际贸易术语解释通则',     dot:'#e2b45a' },
  { id:'doc',   label:'무역서류',      zh:'单据术语',                dot:'#4db87a' },
  { id:'pay',   label:'결제',          zh:'贸易结算',                dot:'#4dc4b8' },
  { id:'zh',    label:'중국어 표기',   zh:'汉语书写练习',             dot:'#9b72e0' },
];

const Q = [
  // ── 청약·승낙 ──────────────────────────────────────────
  { id:1, cat:'offer',
    text:'무역계약은 청약자가 피청약자에게 일정 조건으로 계약을 체결하고 싶다는 [①] 표시를 하고, 피청약자가 이에 동의하는 [②]을 함으로써 성립한다.',
    blanks:[
      { ans:'의사',  hint:'意思表示의 앞 두 글자 (意思 yìsi)' },
      { ans:'승낙',  hint:'接受 jiēshòu' },
    ],
    note:'무역계약 성립 = 청약(发盘 offer) + 승낙(接受 acceptance)' },

  { id:2, cat:'offer',
    text:'매도인이 발행하는 offer를 [①](卖方报盘)이라 하고, 매수인이 발행하는 offer를 [②](买方报盘)이라 한다.',
    blanks:[
      { ans:'매도청약', hint:'판매청약 / selling offer' },
      { ans:'매수청약', hint:'매입청약 / buying offer' },
    ],
    note:'발행 주체(发行主体)에 따른 분류' },

  { id:3, cat:'offer',
    text:'확정성이 확보된 청약을 [①](实盘)이라 하고, 확정성이 없는 청약을 [②](虚盘)이라 한다.',
    blanks:[
      { ans:'확정청약',   hint:'实盘 shípán / firm offer' },
      { ans:'불확정청약', hint:'虚盘 xūpán / free offer' },
    ],
    note:'확정청약: 승낙 유효기간이 명시되거나 취소불능 표시가 있는 것' },

  { id:4, cat:'offer',
    text:'원청약에 대하여 수정을 가한 offer를 [①](还盘)라 한다. 이는 원청약에 대한 [②]이며, 새로운 청약의 성격을 가진다.',
    blanks:[
      { ans:'반대청약', hint:'还盘 huánpán / counter offer' },
      { ans:'거절',     hint:'반대청약 = 원청약 거절 + 새 조건 제시' },
    ],
    note:'반대청약이 제시되면 원청약은 소멸하고 새 청약이 성립됨' },

  { id:5, cat:'offer',
    text:'청약의 [①](撤销)는 원칙적으로 불가능하고, 청약의 [②](撤回)는 청약의 의사표시가 상대방에게 도달하기 전 또는 동시에 가능하다.',
    blanks:[
      { ans:'취소', hint:'撤销 chèxiāo — 원칙적 불가' },
      { ans:'철회', hint:'撤回 chèhuí — 도달 전/동시에 가능' },
    ],
    note:'취소(撤销) ≠ 철회(撤回): 도달 전후 시점 차이가 핵심' },

  { id:6, cat:'offer',
    text:'승낙의 요건은 [①] 수락(absolute and unconditional)이어야 하며, 승낙이 발효되면 [②]이 성립되기 때문에 취소가 불가능하다.',
    blanks:[
      { ans:'절대적·무조건적', hint:'absolute and unconditional' },
      { ans:'계약',           hint:'승낙 발효 = 계약 성립' },
    ],

// ════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════
const SAVE_KEY = 'tq-v2';

let cat    = 'all';
let mode   = 'study';
let order  = Q.map(q => q.id);
let isWrongOnly = false;

// answered[qid_bi] = typed string
// correct[qid_bi]  = true | false | undefined
let answered = {};
let correct  = {};
let revealed = {};  // revealed[qid] = true

function bk(qid, bi) { return qid + '_' + bi; }

function loadSave() {
  try {
    const s = JSON.parse(localStorage.getItem(SAVE_KEY) || 'null');
    if (s) { answered = s.answered||{}; correct = s.correct||{}; revealed = s.revealed||{}; }
  } catch(e) {}
}
function save() {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify({ answered, correct, revealed })); } catch(e) {}
}

// ════════════════════════════════════════════
//  FILTER
// ════════════════════════════════════════════
function getQs() {
  let qs = Q.filter(q => cat === 'all' || q.cat === cat);
  if (isWrongOnly) {
    qs = qs.filter(q => q.blanks.some((_, bi) => correct[bk(q.id, bi)] === false));
  }
  const idSet = new Set(qs.map(q => q.id));
  return order.filter(id => idSet.has(id)).map(id => Q.find(q => q.id === id));
}

// ════════════════════════════════════════════
//  SCORE
// ════════════════════════════════════════════
function calcScore() {
  const qs = getQs();
  const keys = qs.flatMap(q => q.blanks.map((_, bi) => bk(q.id, bi)));
  const total = keys.length;
  const c = keys.filter(k => correct[k] === true).length;
  const w = keys.filter(k => correct[k] === false).length;
  const pct = total ? Math.round(c / total * 100) : 0;
  return { total, c, w, pct };
}

function updateStats() {
  const { total, c, w, pct } = calcScore();
  document.getElementById('sC').textContent = c;
  document.getElementById('sW').textContent = w;
  document.getElementById('sT').textContent = total;
  document.getElementById('sP').textContent = pct + '%';
  document.getElementById('pProg').textContent  = c;
  document.getElementById('pTotal').textContent = total;
  document.getElementById('progBar').style.width = pct + '%';
}

// ════════════════════════════════════════════
//  SIDEBAR
// ════════════════════════════════════════════
function buildSidebar() {
  const el = document.getElementById('catList');
  el.innerHTML = CATS.map(c => {
    const n = c.id === 'all' ? Q.length : Q.filter(q => q.cat === c.id).length;
    return `<div class="cat-item ${c.id===cat?'active':''}" onclick="setCat('${c.id}')">
      <span class="ci-dot" style="background:${c.dot}"></span>
      <span style="flex:1">${c.label}</span>
      <span class="ci-count">${n}</span>
    </div>`;
  }).join('');
}

// ════════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════════
function render() {
  buildSidebar();
  updateStats();

  const catObj = CATS.find(c => c.id === cat);
  document.getElementById('topTitle').textContent = catObj ? catObj.label : '전체 문제';
  document.getElementById('topZh').textContent    = catObj ? catObj.zh   : '';

  const qs   = getQs();
  const area = document.getElementById('quizArea');

  if (!qs.length) {
    area.innerHTML = `<div class="empty-state"><div class="big">🎉</div><p>${isWrongOnly ? '오답이 없습니다! 모두 맞혔어요.' : '문제가 없습니다.'}</p></div>`;
    document.getElementById('scorePanel').classList.remove('open');
    return;
  }

  area.innerHTML = qs.map((q, idx) => buildCard(q, idx)).join('');
  checkScore();
}

function catBadge(c) {
  const map = { offer:'cb-offer', inco:'cb-inco', doc:'cb-doc', pay:'cb-pay', zh:'cb-zh' };
  const labels = { offer:'청약·승낙 / 发盘接受', inco:'인코텀즈 / Incoterms', doc:'서류 / 单据', pay:'결제 / 结算', zh:'중국어 / 汉语' };
  return `<span class="cat-badge ${map[c]||''}">${labels[c]||c}</span>`;
}

function circled(bi) { return String.fromCharCode(9312 + bi); }

function buildCard(q, idx) {
  const allOk  = q.blanks.every((_, bi) => correct[bk(q.id, bi)] === true);
  const anyBad = q.blanks.some ((_, bi) => correct[bk(q.id, bi)] === false);
  const rev    = !!revealed[q.id];
  const isDone = allOk || rev;

  let stCls = '';
  if (isDone)    stCls = 'st-correct';
  else if (anyBad) stCls = 'st-wrong';

  // Build question text with inputs
  let txt = q.text.replace(/\n/g, '<br>');
  q.blanks.forEach((b, bi) => {
    const k   = bk(q.id, bi);
    const val = answered[k] || '';
    const cls = correct[k] === true ? 'ok' : correct[k] === false ? 'bad' : '';
    const locked = isDone || (mode === 'exam' && correct[k] === true);
    const w = Math.max(56, (b.ans.length + 2) * 15);
    txt = txt.replace(
      '[' + circled(bi) + ']',
      `<span class="bwrap"><span class="bidx">[${bi+1}]</span><input
        type="text" id="inp_${q.id}_${bi}" value="${esc(val)}"
        placeholder="입력" class="${cls}" style="width:${w}px"
        oninput="onInput(${q.id},${bi},this.value)"
        onkeydown="if(event.key==='Enter')gradeOne(${q.id})"
        ${locked ? 'readonly' : ''}
      ></span>`
    );
  });

  const hintHtml = q.blanks.map((b, bi) =>
    `<span class="hint-chip">[${bi+1}] ${b.hint}</span>`
  ).join('');

  const ansHtml = '✅ 정답: ' + q.blanks.map((b, bi) =>
    `<strong>[${bi+1}] ${b.ans}</strong>`
  ).join('  ·  ') + `<div class="ans-note">📌 ${q.note}</div>`;

  const icon = isDone ? '✅' : anyBad ? '❌' : '○';
  const examHide = mode === 'exam' && !isDone;

  return `<div class="q-card ${stCls}" id="card_${q.id}">
    <div class="q-top">
      <span class="q-num">Q${String(idx+1).padStart(2,'0')}</span>
      ${catBadge(q.cat)}
      <span class="q-blanks">${q.blanks.length}칸</span>
      <span class="q-icon">${icon}</span>
    </div>
    <div class="q-body">
      <div class="q-text">${txt}</div>
      <div class="btn-row">
        <button class="qbtn grade" onclick="gradeOne(${q.id})" ${isDone?'disabled':''}>채점</button>
        ${!examHide ? `<button class="qbtn hint" onclick="toggleHint(${q.id})">힌트</button>` : ''}
        ${!examHide && !isDone ? `<button class="qbtn show" onclick="revealOne(${q.id})">정답 보기</button>` : ''}
        ${isDone ? `<button class="qbtn retry" onclick="retryOne(${q.id})">↺ 다시 풀기</button>` : ''}
      </div>
      <div class="hint-area" id="hint_${q.id}">${hintHtml}</div>
      <div class="ans-box ${isDone?'open':''}" id="ans_${q.id}">${ansHtml}</div>
      <div class="wrong-msg" id="wm_${q.id}">❌ 틀린 빈칸이 있습니다. 다시 확인해보세요.</div>
    </div>
  </div>`;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ════════════════════════════════════════════
//  INTERACTIONS
// ════════════════════════════════════════════
function onInput(qid, bi, val) {
  const k = bk(qid, bi);
  answered[k] = val;
  delete correct[k];
  const inp = document.getElementById('inp_' + qid + '_' + bi);
  if (inp) inp.className = '';
  updateStats();
  save();
}

function gradeOne(qid) {
  const q = Q.find(x => x.id === qid);
  let allOk = true;
  q.blanks.forEach((b, bi) => {
    const k   = bk(qid, bi);
    const inp = document.getElementById('inp_' + qid + '_' + bi);
    const val = (inp ? inp.value : (answered[k] || '')).trim();
    answered[k] = val;
    const ok = val.replace(/\s/g,'') === b.ans.replace(/\s/g,'');
    correct[k] = ok;
    if (inp) inp.className = ok ? 'ok' : 'bad';
    if (!ok) allOk = false;
  });
  save();

  const card = document.getElementById('card_' + qid);
  card.className = card.className.replace(/st-\w+/g, '').trim();

  if (allOk) {
    card.classList.add('st-correct');
    document.getElementById('ans_' + qid).classList.add('open');
    document.getElementById('wm_'  + qid).classList.remove('open');
    q.blanks.forEach((_, bi) => {
      const inp = document.getElementById('inp_' + qid + '_' + bi);
      if (inp) inp.readOnly = true;
    });
    // swap buttons
    const btnRow = card.querySelector('.btn-row');
    if (btnRow) btnRow.innerHTML = `<button class="qbtn grade" disabled>채점</button><button class="qbtn retry" onclick="retryOne(${qid})">↺ 다시 풀기</button>`;
    showToast('✅ 정답!');
  } else {
    card.classList.add('st-wrong');
    document.getElementById('wm_' + qid).classList.add('open');
  }
  updateStats();
  checkScore();
}

function revealOne(qid) {
  const q = Q.find(x => x.id === qid);
  q.blanks.forEach((b, bi) => {
    const k = bk(qid, bi);
    answered[k] = b.ans;
    correct[k]  = true;
    const inp = document.getElementById('inp_' + qid + '_' + bi);
    if (inp) { inp.value = b.ans; inp.className = 'ok'; inp.readOnly = true; }
  });
  revealed[qid] = true;
  save();

  const card = document.getElementById('card_' + qid);
  card.className = card.className.replace(/st-\w+/g, '').trim();
  card.classList.add('st-reveal');
  document.getElementById('ans_' + qid).classList.add('open');
  document.getElementById('wm_'  + qid).classList.remove('open');
  const btnRow = card.querySelector('.btn-row');
  if (btnRow) btnRow.innerHTML = `<button class="qbtn grade" disabled>채점</button><button class="qbtn retry" onclick="retryOne(${qid})">↺ 다시 풀기</button>`;
  updateStats();
  checkScore();
}

function retryOne(qid) {
  const q = Q.find(x => x.id === qid);
  q.blanks.forEach((_, bi) => { const k = bk(qid, bi); delete answered[k]; delete correct[k]; });
  delete revealed[qid];
  save();
  render();
}

function toggleHint(qid) {
  const el = document.getElementById('hint_' + qid);
  if (el) el.classList.toggle('open');
}

function checkScore() {
  const qs = getQs();
  const allDone = qs.length > 0 && qs.every(q =>
    q.blanks.every((_, bi) => correct[bk(q.id, bi)] !== undefined)
  );
  const panel = document.getElementById('scorePanel');
  if (allDone) {
    const { c, total, pct } = calcScore();
    panel.classList.add('open');
    document.getElementById('scoreBig').textContent = pct + '%';
    document.getElementById('scoreMsg').textContent =
      pct === 100 ? '완벽합니다! 🎉 所有答案正确！' :
      pct >= 80   ? '훌륭해요! 👍 继续加油！' :
      pct >= 60   ? '좋아요! 조금 더 복습해요 📚' :
                    '다시 한번 도전해봐요! 再挑战！';
    document.getElementById('scoreSub').textContent = c + ' / ' + total + ' 정답';
  } else {
    panel.classList.remove('open');
  }
}

// ════════════════════════════════════════════
//  CONTROLS
// ════════════════════════════════════════════
function gradeAll() {
  getQs().forEach(q => {
    const done = q.blanks.every((_, bi) => correct[bk(q.id, bi)] !== undefined);
    if (!done) gradeOne(q.id);
  });
  showToast('전체 채점 완료');
}

function showAll() {
  getQs().forEach(q => {
    if (!revealed[q.id] && !q.blanks.every((_, bi) => correct[bk(q.id, bi)] === true)) {
      revealOne(q.id);
    }
  });
  showToast('모든 정답을 표시했습니다');
}

function wrongOnly() {
  isWrongOnly = !isWrongOnly;
  cat = 'all';
  showToast(isWrongOnly ? '🔁 오답만 표시합니다' : '전체 문제로 돌아왔습니다');
  render();
}

function shuffle() {
  order = order.slice().sort(() => Math.random() - .5);
  showToast('🔀 문제 순서를 섞었습니다');
  render();
}

function resetAll() {
  if (!confirm('모든 답변 기록을 초기화할까요?')) return;
  answered = {}; correct = {}; revealed = {};
  isWrongOnly = false;
  order = Q.map(q => q.id);
  save(); render();
  showToast('↺ 초기화되었습니다');
}

function clearData() {
  if (!confirm('저장된 데이터를 삭제할까요?')) return;
  localStorage.removeItem(SAVE_KEY);
  answered = {}; correct = {}; revealed = {};
  render(); showToast('🗑 데이터가 삭제되었습니다');
}

function setCat(id) {
  cat = id; isWrongOnly = false;
  render(); closeSb();
}

function setMode(m) {
  mode = m;
  document.getElementById('btnStudy').className = 'mode-btn' + (m==='study'?' on':'');
  document.getElementById('btnExam' ).className = 'mode-btn' + (m==='exam' ?' on':'');
  render();
  showToast(m==='exam' ? '🎓 시험 모드: 힌트·정답 버튼 숨김' : '📖 학습 모드');
}

function toggleSb() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}
function closeSb() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

let _toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ════════════════════════════════════════════
//  INIT  (DOM is fully parsed here)
// ════════════════════════════════════════════
loadSave();
render();
</script>
